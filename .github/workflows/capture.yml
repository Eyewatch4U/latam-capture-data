name: Capture LATAM

# Replica exacta de meltwater-relay/meltwater.yml (el que corre en produccion).
# Repo PUBLICO -> minutos de Actions ilimitados y gratis.
# Disparo: cron-job.org POST a workflow_dispatch cada 15 min.
#   https://api.github.com/repos/Eyewatch4U/latam-capture-data/actions/workflows/capture.yml/dispatches
#
# Cadena: Actions (Playwright captura la URL del .gz)
#           -> POST {url, sync:true} al webhook de Make
#           -> Make: HTTP POST a monitorlatam/update-url con x-sync-token
#           -> Worker baja el .gz y escribe KV

on:
  workflow_dispatch:

concurrency:
  group: latam-capture
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  capture:
    name: Capturar y enviar a Make.com
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright + Chromium
        run: |
          pip install playwright==1.47.0
          playwright install chromium --with-deps

      - name: Ejecutar capture
        env:
          MELTWATER_URL:      ${{ secrets.MELTWATER_URL }}
          MELTWATER_PASSWORD: ${{ secrets.MELTWATER_PASSWORD }}
          MAKE_WEBHOOK_URL:   ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          mkdir -p debug_output
          python capture_latam.py 2>&1 | tee debug_output/full_log.txt
          exit ${PIPESTATUS[0]}

      - name: Subir debug como artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug_output/
          retention-days: 7
          if-no-files-found: ignore

      - name: Resultado
        if: always()
        run: echo "Ejecución finalizada a las $(date -u '+%Y-%m-%d %H:%M:%S') UTC"
